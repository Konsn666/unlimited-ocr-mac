<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR 扫描器</title>
  <link rel="stylesheet" href="/static/style.css?v=6">
</head>
<body>
  <!-- Toolbar -->
  <header id="toolbar">
    <div class="toolbar-left">
      <h1 class="logo">📄 OCR Scanner</h1>
      <label class="btn upload-btn" for="file-input">📁 上传文件</label>
      <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.webp,.bmp" multiple hidden>
      <button id="scan-btn" class="btn primary" disabled>🚀 开始扫描</button>
    </div>
    <div class="toolbar-center">
      <button id="prev-page" class="btn icon" disabled>◀</button>
      <span id="page-indicator">-</span>
      <button id="next-page" class="btn icon" disabled>▶</button>
    </div>
    <div class="toolbar-right">
      <select id="translate-lang">
        <option value="">不翻译</option>
        <option value="zh-CN">→ 简体中文</option>
        <option value="zh-TW">→ 繁體中文</option>
        <option value="en">→ English</option>
        <option value="ja">→ 日本語</option>
        <option value="ko">→ 한국어</option>
        <option value="fr">→ Français</option>
        <option value="de">→ Deutsch</option>
      </select>
      <button id="translate-btn" class="btn" disabled>🌐 翻译</button>
      <button id="export-btn" class="btn success" disabled>📥 导出 Word</button>
    </div>
  </header>

  <!-- Progress bar -->
  <div id="progress-bar" class="hidden">
    <div id="progress-fill"></div>
    <span id="progress-text">准备中...</span>
  </div>

  <!-- Split panels -->
  <main id="split-container">
    <div id="left-panel">
      <div class="panel-header">源文件</div>
      <div id="source-view">
        <img id="source-image" alt="Source page">
        <p id="source-placeholder" class="placeholder">上传 PDF 或图片开始</p>
      </div>
    </div>
    <div id="divider"></div>
    <div id="right-panel">
      <div class="panel-header">识别结果 <span id="edit-hint" class="hint">（点击文字可编辑）</span></div>
      <div id="ocr-content">
        <p class="placeholder">扫描结果将显示在这里</p>
      </div>
    </div>
  </main>

  <!-- Status bar -->
  <footer id="status-bar">
    <span id="status-text">就绪</span>
    <span id="model-info"></span>
  </footer>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script src="/static/app.js?v=6"></script>
</body>
</html>
